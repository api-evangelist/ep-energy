aid: ep-energy
name: EP Energy
description: >-
  EP Energy Corporation was an independent exploration and production company
  engaged in the acquisition and development of unconventional onshore oil
  and natural gas properties in the United States. EP Energy filed for Chapter
  11 bankruptcy in October 2019 and emerged in October 2020, with assets
  later acquired by IKAV in March 2022. The company does not maintain any
  public APIs, SDKs, or developer resources.
